<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triple Espresso</title>

    <!-- Normalize -->
    <link rel="stylesheet" href="normalize.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Serif:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="style.css" />

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" />
  </head>

  <body>
    <!-- HEADER -->

    <header class="header">
      <img src="logo_coffeeshop_dark.svg" alt="Triple Espresso" class="logo" />

      <nav class="nav">
        <div class="nav-links">
          <a href="#">Reservar una mesa</a>
          <a href="#">Contactos</a>
        </div>
      </nav>

      <h1 class="header-title">
        Café de especialidad <br />
        en Triple Peaks
      </h1>

      <p class="header-description">
        ¡Te damos la bienvenida a nuestra zona de estudio! Aquí tenemos café
        para darte energía y motivar tu creatividad.
      </p>

      <img
        src="inside_coffee_shop.png"
        alt="Interior de la cafetería Triple Espresso"
        class="header-image"
      />
    </header>

    <!-- MAIN -->

    <main class="content">
      <section class="reservation">
        <h2 class="reservation-title">Reservar una mesa</h2>

        <form class="reservation-form">
          <fieldset class="reservation-fieldset">
            <label class="reservation-label">
              Nombre

              <input
                type="text"
                class="reservation-input"
                placeholder="Tu nombre"
                required
              />
            </label>

            <label class="reservation-label">
              Número de personas

              <input
                type="number"
                class="reservation-input"
                min="1"
                max="20"
                required
              />
            </label>

            <label class="reservation-label">
              Fecha y hora

              <input type="datetime-local" class="reservation-input" required />
            </label>

            <label class="reservation-label">
              Comentarios

              <textarea
                class="reservation-textarea"
                rows="4"
                placeholder="Comentarios especiales"
              ></textarea>
            </label>

            <button type="submit" class="reservation-button">Reservar</button>
          </fieldset>
        </form>
      </section>
    </main>

    <!-- FOOTER -->

    <footer class="footer">
      <p>© 2026 Luis A. Toussaint</p>
    </footer>
  </body>
</html>
